<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>チップ帳</title>
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#F2F2F7">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="チップ帳">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  /* ===== iOSネイティブ風トークン ===== */
  :root {
    --bg: #F2F2F7;            /* systemGroupedBackground */
    --surface: #FFFFFF;
    --surface-press: #E5E5EA;
    --ink: #1C1C1E;
    --muted: #8E8E93;
    --line: rgba(60, 60, 67, .16);
    --tint: #0F7B55;          /* アクセント: 深緑（雀卓の名残） */
    --tint-soft: rgba(15, 123, 85, .13);
    --on-tint: #FFFFFF;
    --pos: #1F8A3D;
    --neg: #D70015;
    --ok-bg: #E6F6EC;
    --warn: #A65B00;
    --warn-bg: #FFF3E0;
    --key-bg: #E9E9EE;
    --key-press: #D6D6DC;
    --sheet-bg: #F7F7FA;
    --scrim: rgba(0, 0, 0, .45);
    --card-shadow: 0 1px 2px rgba(0, 0, 0, .05);
    --sheet-shadow: 0 -8px 32px rgba(0, 0, 0, .16);
    --shimmer: rgba(127, 127, 127, .14);
    /* 参加者カラー11色（色相を大きく離した選択パレット、ライト面検証済み） */
    --col1: #2a78d6;  /* ブルー */
    --col2: #0898be;  /* シアン */
    --col3: #00907a;  /* ティール */
    --col4: #188a3c;  /* グリーン */
    --col5: #9c7000;  /* ゴールド */
    --col6: #ea6d12;  /* オレンジ */
    --col7: #d92b20;  /* レッド */
    --col8: #d63384;  /* ピンク */
    --col9: #7c3aed;  /* パープル */
    --col10: #303eae; /* ネイビー */
    --col11: #8b4f13; /* ブラウン */
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000000;
      --surface: #1C1C1E;
      --surface-press: #2C2C2E;
      --ink: #FFFFFF;
      --muted: #98989F;
      --line: rgba(84, 84, 88, .55);
      --tint: #30D158;
      --tint-soft: rgba(48, 209, 88, .16);
      --on-tint: #04250F;
      --pos: #30D158;
      --neg: #FF453A;
      --ok-bg: #0D2C18;
      --warn: #FFB340;
      --warn-bg: #33230C;
      --key-bg: #2C2C2E;
      --key-press: #3A3A3C;
      --sheet-bg: #1C1C1E;
      --scrim: rgba(0, 0, 0, .55);
      --card-shadow: none;
      --sheet-shadow: 0 -8px 32px rgba(0, 0, 0, .5);
      --shimmer: rgba(255, 255, 255, .07);
      /* ダーク面用に段調整した同じ11色 */
      --col1: #57a0f0;
      --col2: #1fb0d6;
      --col3: #0f9078;
      --col4: #27a855;
      --col5: #c79500;
      --col6: #e8721f;
      --col7: #e84b3f;
      --col8: #ec66a8;
      --col9: #9b79ea;
      --col10: #5f6adf;
      --col11: #ad7134;
    }
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    margin: 0;
    min-height: 100vh;
    min-height: 100dvh;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", "Noto Sans JP", sans-serif;
    font-size: 16px;
    line-height: 1.5;
    touch-action: manipulation;
  }

  button {
    font: inherit;
    color: inherit;
    border: none;
    background: none;
    cursor: pointer;
    padding: 0;
  }
  button:focus-visible, input:focus-visible {
    outline: 2.5px solid var(--tint);
    outline-offset: 2px;
  }
  svg { display: block; flex-shrink: 0; }

  .app {
    max-width: 520px;
    margin: 0 auto;
    padding: calc(18px + env(safe-area-inset-top, 0px)) 16px calc(92px + env(safe-area-inset-bottom, 0px));
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* ===== ヘッダー ===== */
  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 12px;
    padding: 4px 2px 0;
  }
  h1 {
    margin: 0;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -.02em;
    line-height: 1.15;
  }
  .sub {
    margin: 1px 0 0;
    font-size: 13px;
    color: var(--muted);
  }
  .rate-pill {
    flex-shrink: 0;
    display: inline-flex;
    align-items: baseline;
    gap: 5px;
    background: var(--tint-soft);
    color: var(--tint);
    border-radius: 999px;
    padding: 8px 15px;
    font-size: 13px;
    font-weight: 600;
    transition: transform .12s ease-out, opacity .12s;
  }
  .rate-pill:active { transform: scale(.96); opacity: .75; }
  .rate-pill strong {
    font-size: 18px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  .view { display: flex; flex-direction: column; gap: 14px; }
  .view[hidden] { display: none; }

  /* ===== 検算バナー ===== */
  .banner {
    border-radius: 14px;
    padding: 12px 14px;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    color: var(--muted);
    box-shadow: var(--card-shadow);
  }
  .banner strong { font-variant-numeric: tabular-nums; font-weight: 700; }
  .banner.ok   { background: var(--ok-bg);   color: var(--pos); }
  .banner.warn { background: var(--warn-bg); color: var(--warn); }

  /* ===== 参加者カード ===== */
  .players {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .player-card {
    background: var(--surface);
    border-radius: 14px;
    padding: 14px 15px 12px;
    text-align: left;
    display: flex;
    flex-direction: column;
    gap: 1px;
    min-height: 88px;
    box-shadow: var(--card-shadow);
    transition: transform .12s ease-out, background .12s;
  }
  .player-card:active { transform: scale(.97); background: var(--surface-press); }
  .player-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
    min-width: 0;
  }
  .player-name .pn {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .p-dot, .lg-dot, .tt-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }
  .player-pts {
    font-size: 30px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: -.02em;
    line-height: 1.2;
  }
  .player-pts.pos { color: var(--pos); }
  .player-pts.neg { color: var(--neg); }
  .player-pts.zero { color: var(--muted); }
  .player-hint { font-size: 11px; color: var(--muted); }

  .add-player {
    background: var(--surface);
    border-radius: 14px;
    padding: 13px;
    font-size: 15px;
    font-weight: 600;
    color: var(--tint);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    box-shadow: var(--card-shadow);
    transition: transform .12s ease-out, background .12s;
  }
  .add-player:active { transform: scale(.98); background: var(--surface-press); }

  /* ===== スケルトン ===== */
  .skel {
    position: relative;
    overflow: hidden;
    background: var(--key-bg);
    border-radius: 14px;
  }
  .skel::after {
    content: "";
    position: absolute;
    inset: 0;
    transform: translateX(-100%);
    background: linear-gradient(90deg, transparent, var(--shimmer), transparent);
    animation: shimmer 1.3s infinite;
  }
  @keyframes shimmer { to { transform: translateX(100%); } }
  .skel-banner { height: 46px; }
  .skel-card { height: 88px; }

  /* ===== 履歴 ===== */
  .history-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    padding: 0 2px;
  }
  h2 {
    margin: 0;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -.01em;
    flex: 1;
  }
  .head-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 14px;
    font-weight: 600;
    color: var(--tint);
    padding: 6px 2px;
    transition: opacity .12s;
  }
  .head-btn:active { opacity: .55; }

  .session-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
  }
  .session-grid.two { grid-template-columns: 1fr 1fr; }
  .session-grid.two .day-item.open { grid-column: 1 / -1; }
  .session-grid.two .day-item:not(.open) .day-row { font-size: 13px; gap: 6px; }
  .session-grid.two .day-item:not(.open) .day-rank { width: 26px; font-size: 11px; }
  .session-grid.two .day-item:not(.open) .day-date { font-size: 14px; }

  .col-toggle {
    display: flex;
    background: var(--key-bg);
    border-radius: 9px;
    padding: 2px;
    gap: 2px;
  }
  .col-toggle button {
    padding: 5px 8px;
    border-radius: 7px;
    color: var(--muted);
    transition: background .15s, color .15s;
  }
  .col-toggle button.active {
    background: var(--surface);
    color: var(--tint);
    box-shadow: 0 1px 3px rgba(0,0,0,.12);
  }
  .day-head {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    text-align: left;
    transition: opacity .12s;
  }
  .day-head:active { opacity: .6; }
  .day-head .dh-l {
    display: flex;
    flex-direction: column;
    gap: 1px;
    flex: 1;
    min-width: 0;
  }
  .day-head .chev {
    color: var(--muted);
    transition: transform .2s ease-out;
  }
  .day-item.open .chev { transform: rotate(180deg); }
  .day-date {
    font-weight: 700;
    font-size: 15px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .day-sub {
    font-size: 11px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .day-ranking {
    display: flex;
    flex-direction: column;
    margin-top: 6px;
  }
  .day-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 6px 0;
    border-bottom: .5px solid var(--line);
    font-size: 14px;
    font-variant-numeric: tabular-nums;
  }
  .day-row:last-child { border-bottom: none; padding-bottom: 0; }
  .day-rank {
    flex-shrink: 0;
    width: 32px;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
  }
  .day-row .day-p {
    flex: 1;
    color: var(--ink);
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .day-row b { font-weight: 700; }
  .day-row b.pos { color: var(--pos); }
  .day-row b.neg { color: var(--neg); }
  .day-entries {
    margin-top: 10px;
    padding-top: 4px;
    border-top: .5px solid var(--line);
  }
  .day-foot {
    display: flex;
    justify-content: flex-end;
    margin-top: 4px;
  }
  .day-warn {
    font-size: 11px;
    font-weight: 700;
    color: var(--warn);
    background: var(--warn-bg);
    border-radius: 999px;
    padding: 1px 8px;
    white-space: nowrap;
  }
  .session-live {
    font-size: 11px;
    font-weight: 700;
    color: var(--pos);
    background: var(--ok-bg);
    border-radius: 999px;
    padding: 1px 8px;
    white-space: nowrap;
  }

  .session {
    background: var(--surface);
    border-radius: 14px;
    padding: 15px;
    display: flex;
    flex-direction: column;
    box-shadow: var(--card-shadow);
  }
  .session-copy {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 13px;
    font-weight: 600;
    color: var(--tint);
    padding: 4px 0;
    transition: opacity .12s;
  }
  .session-copy:active { opacity: .55; }

  .history-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
  }
  .history-list li {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: .5px solid var(--line);
    font-size: 14px;
  }
  .history-list li:last-child { border-bottom: none; padding-bottom: 2px; }
  .h-time { color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums; flex-shrink: 0; }
  .h-name { font-weight: 600; flex-shrink: 0; max-width: 26%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .h-calc { color: var(--muted); font-size: 13px; font-variant-numeric: tabular-nums; flex: 1; min-width: 0; }
  .h-delta { font-weight: 700; font-variant-numeric: tabular-nums; flex-shrink: 0; }
  .h-delta.pos { color: var(--pos); }
  .h-delta.neg { color: var(--neg); }
  .h-del {
    flex-shrink: 0;
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
    min-width: 32px;
    min-height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 999px;
    transition: background .12s;
  }
  .h-del:active { background: var(--surface-press); }
  .h-del.arm { background: var(--neg); color: #FFF; padding: 0 10px; }
  .history-empty {
    color: var(--muted);
    font-size: 14px;
    text-align: center;
    padding: 28px 8px;
    background: var(--surface);
    border-radius: 14px;
    grid-column: 1 / -1;
    box-shadow: var(--card-shadow);
  }

  /* ===== 推移グラフ ===== */
  .chart-controls {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .seg-sm { grid-template-columns: 1fr 1fr 1fr; }
  .seg-sm button { padding: 8px; font-size: 13px; }
  .seg-sm button.active { color: var(--tint); }
  .period-chips {
    display: flex;
    gap: 6px;
  }
  .period-chips button {
    flex: 1;
    background: var(--key-bg);
    border-radius: 999px;
    padding: 6px 0;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--muted);
    transition: background .15s, color .15s;
  }
  .period-chips button.active {
    background: var(--tint);
    color: var(--on-tint);
  }
  .chart-card {
    background: var(--surface);
    border-radius: 14px;
    padding: 15px;
    box-shadow: var(--card-shadow);
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .chart-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 4px 14px;
    margin-bottom: 8px;
  }
  .lg-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    padding: 4px 0;
    transition: opacity .15s;
  }
  .lg-chip.off { opacity: .3; }
  .chart-box { position: relative; }
  .chart-box svg { touch-action: pan-y; display: block; }
  .chart-tip {
    position: absolute;
    top: 6px;
    background: var(--sheet-bg);
    border-radius: 10px;
    padding: 8px 11px;
    font-size: 12px;
    box-shadow: 0 3px 14px rgba(0, 0, 0, .22);
    pointer-events: none;
    min-width: 118px;
    z-index: 5;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .chart-tip[hidden] { display: none; }
  .tt-date { font-weight: 700; margin-bottom: 2px; }
  .tt-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    font-variant-numeric: tabular-nums;
  }
  .tt-row b { font-weight: 700; }
  .tt-l { display: flex; align-items: center; gap: 5px; color: var(--muted); }
  .chart-hint {
    margin: 6px 0 0;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
  }
  .chart-empty {
    margin: 0;
    color: var(--muted);
    font-size: 14px;
    text-align: center;
    padding: 36px 8px;
  }

  /* カラーピッカー */
  .color-cap {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-align: center;
    margin-bottom: -6px;
  }
  .color-row {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 10px 6px;
    justify-items: center;
    padding: 0 4px;
  }
  .csw {
    width: 33px; height: 33px;
    border-radius: 50%;
    transition: transform .1s ease-out;
  }
  .csw:active { transform: scale(.88); }
  .csw.active {
    box-shadow: 0 0 0 2.5px var(--sheet-bg), 0 0 0 5px var(--ink);
  }

  /* ===== 役タブ ===== */
  .win-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .win-card {
    background: var(--surface);
    border-radius: 14px;
    padding: 13px 14px;
    box-shadow: var(--card-shadow);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .win-card-top {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .win-name {
    font-weight: 700;
    font-size: 14px;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .win-han {
    font-size: 12.5px;
    font-weight: 700;
    color: var(--tint);
    background: var(--tint-soft);
    border-radius: 999px;
    padding: 3px 10px;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .win-han.ym { color: var(--neg); background: var(--warn-bg); }
  .win-time {
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }
  .win-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .win-tag {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    background: var(--key-bg);
    border-radius: 999px;
    padding: 3px 9px;
  }

  .yaku-stat-head {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .yaku-stat-name {
    font-weight: 700;
    font-size: 14px;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .yaku-stat-total {
    font-size: 11.5px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .yaku-stat-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .yaku-stat-tag {
    display: flex;
    align-items: baseline;
    gap: 5px;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink);
    background: var(--key-bg);
    border-radius: 999px;
    padding: 3px 9px;
  }
  .yaku-stat-tag b {
    font-weight: 700;
    color: var(--tint);
    font-variant-numeric: tabular-nums;
  }

  /* 上がり記録シート */
  .win-players {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .win-players button {
    background: var(--surface);
    border-radius: 999px;
    padding: 8px 15px;
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
    box-shadow: var(--card-shadow);
    transition: background .12s, color .12s, transform .1s ease-out;
  }
  .win-players button:active { transform: scale(.96); }
  .win-players button.active { background: var(--tint); color: var(--on-tint); }
  .win-players button.active .p-dot { background: var(--on-tint) !important; }

  .yaku-scroll {
    max-height: 34vh;
    overflow-y: auto;
    padding-right: 2px;
  }
  .yaku-group { margin-bottom: 12px; }
  .yaku-group:last-child { margin-bottom: 0; }
  .yaku-group-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    margin: 0 0 6px 2px;
  }
  .yaku-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .yaku-chip {
    background: var(--key-bg);
    border-radius: 999px;
    padding: 7px 13px;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    display: inline-flex;
    align-items: baseline;
    gap: 5px;
    transition: background .12s, color .12s, transform .1s ease-out;
  }
  .yaku-chip:active { transform: scale(.94); }
  .yaku-chip.active { background: var(--tint); color: var(--on-tint); }
  .yaku-chip-local {
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    background: var(--surface);
    border-radius: 999px;
    padding: 1px 6px;
  }
  .yaku-chip.active .yaku-chip-local { color: var(--tint); }
  .yaku-chip.yakuman { box-shadow: inset 0 0 0 1.5px var(--neg); color: var(--neg); }
  .yaku-chip.yakuman.active { background: var(--neg); color: #fff; box-shadow: none; }

  /* ===== タブバー ===== */
  .tabbar {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    margin: 0 auto;
    max-width: 520px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    background: color-mix(in srgb, var(--bg) 78%, transparent);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    backdrop-filter: blur(20px) saturate(180%);
    border-top: .5px solid var(--line);
    padding-bottom: env(safe-area-inset-bottom, 0px);
    z-index: 30;
  }
  .tabbar button {
    padding: 9px 0 7px;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    transition: color .15s;
  }
  .tabbar button.active { color: var(--tint); }

  /* ===== トースト ===== */
  .toast {
    position: fixed;
    left: 50%;
    bottom: calc(84px + env(safe-area-inset-bottom, 0px));
    transform: translate(-50%, 12px);
    background: color-mix(in srgb, var(--ink) 92%, transparent);
    -webkit-backdrop-filter: blur(8px);
    backdrop-filter: blur(8px);
    color: var(--bg);
    padding: 11px 20px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 500;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s, transform .2s;
    z-index: 60;
    max-width: 88vw;
    box-shadow: 0 4px 16px rgba(0,0,0,.2);
  }
  .toast.show { opacity: 1; transform: translate(-50%, 0); }

  /* ===== シート ===== */
  .backdrop {
    position: fixed;
    inset: 0;
    background: var(--scrim);
    -webkit-backdrop-filter: blur(2px);
    backdrop-filter: blur(2px);
    opacity: 0;
    pointer-events: none;
    transition: opacity .22s;
    z-index: 40;

  .sheet {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    margin: 0 auto;
    max-width: 520px;
    background: var(--sheet-bg);
    border-radius: 16px 16px 0 0;
    padding: 16px 18px calc(20px + env(safe-area-inset-bottom, 0px));
    transform: translateY(105%);
    transition: transform .28s cubic-bezier(.32,.72,.28,1);

    box-shadow: var(--sheet-shadow);
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .sheet.show { transform: translateY(0); }
  .sheet-grip {
    width: 36px; height: 5px;
    border-radius: 3px;
    background: var(--key-press);
    margin: -4px auto 0;
  }
  .sheet-title {
    font-size: 17px;
    font-weight: 700;
    text-align: center;
    letter-spacing: -.01em;
  }
  .sheet-title .who { color: var(--tint); }

  /* セグメントコントロール */
  .seg {
    display: grid;
    grid-template-columns: 1fr 1fr;
    background: var(--key-bg);
    border-radius: 10px;
    padding: 2.5px;
  }
  .seg button {
    border-radius: 8px;
    padding: 9px;
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    transition: background .15s, color .15s, box-shadow .15s;
  }
  .seg button.active {
    background: var(--surface);
    box-shadow: 0 1px 4px rgba(0,0,0,.14);
  }
  #signPos.active { color: var(--pos); }
  #signNeg.active { color: var(--neg); }

  .preview {
    text-align: center;
    font-size: 14px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    min-height: 36px;
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 6px;
  }
  .preview strong {
    font-size: 26px;
    font-weight: 700;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
    letter-spacing: -.02em;
  }
  .preview strong.pos { color: var(--pos); }
  .preview strong.neg { color: var(--neg); }

  .keypad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .keypad button {
    background: var(--surface);
    border-radius: 11px;
    padding: 13px 0;
    font-size: 23px;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 52px;
    box-shadow: var(--card-shadow);
    transition: background .1s, transform .1s ease-out;
  }
  .keypad button:active { background: var(--key-press); transform: scale(.96); }
  .keypad .fn { font-size: 16px; color: var(--muted); font-weight: 600; }

  .confirm-btn {
    background: var(--tint);
    color: var(--on-tint);
    border-radius: 13px;
    padding: 15px;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: .02em;

  }
  .confirm-btn:active { transform: scale(.98); opacity: .85; }

  .sheet-minor {

    border-radius: 10px;

    font-weight: 600;
    font-variant-numeric: tabular-nums;

  }
  .rate-presets button:active { transform: scale(.95); }

    background: var(--tint);

  .text-field {

  .text-field::placeholder { color: var(--muted); }

  @media (prefers-reduced-motion: reduce) {
    .sheet, .backdrop, .toast, .tabbar button,

    .keypad button, .rate-presets button, .seg button { transition: none; }

</style>
</head>

<script>
(function () {
  'use strict';

  /* ====== Supabase接続設定（セットアップ時にここを書き換える） ====== */
  var SUPABASE_URL = 'https://yajyjkopjusamvalbunj.supabase.co';
  var SUPABASE_ANON_KEY = 'sb_publishable_Nsy3HBM18ivGwQrSp2Ol9Q_AdWVVRuc';
  /* =============================================================== */

  if (SUPABASE_URL.indexOf('http') !== 0) {
    document.body.innerHTML =
      '<div style="padding:40px 24px;text-align:center;color:#8E8E93;font-size:15px;line-height:2">' +
      'まだ接続設定がされていません。<br>index.html の SUPABASE_URL / SUPABASE_ANON_KEY を設定してください。</div>';
    return;
  }
  var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  /* この時間以上あいだが空いたら「別の日（別セッション）」扱い */
  var SESSION_GAP = 3 * 60 * 60 * 1000;

  var ICON = {
    ok: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8.5 12.4l2.4 2.4 4.6-5"/></svg>',
    warn: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3.8 2.8 19.5h18.4L12 3.8z"/><path d="M12 9.8v4"/><path d="M12 16.8v.2"/></svg>',
    info: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 11v5"/><path d="M12 7.8v.2"/></svg>',
    x: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>',
    back: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5.5 8.5 12l6.5 6.5"/></svg>',
    copy: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2.5"/><path d="M5 15V6a2.5 2.5 0 0 1 2.5-2.5H16"/></svg>'
  };

  var state = { rate: 1, players: [], entries: [], wins: [] };
  var pending = 0;
  var loaded = false;
  var lastSessions = [];
  var expandedKey = null; /* 開いている日付ブロック（セッション開始時刻） */
  /* 履歴の列数（端末ごとに記憶） */
  var histCols = 1;
  try { if (localStorage.getItem('chipcho-hist-cols') === '2') histCols = 2; } catch (e) {}

  /* ---------- サーバー通信（Supabase） ---------- */

  function syncUI() {
    document.getElementById('subLabel').textContent =
      pending > 0 ? '同期中…' : '麻雀チップ収支';
  }

  async function fetchState() {
    var res = await Promise.all([
      sb.from('players').select('id,name,color').order('created_at'),
      sb.from('entries').select('id,player_id,chips,rate,created_at').order('created_at'),
      sb.from('settings').select('value').eq('key', 'rate').maybeSingle(),
      /* winsテーブル未作成（add_wins.sql未実行）でも入力・履歴が壊れないよう、このクエリだけ個別に失敗を許容する */
      sb.from('wins').select('id,player_id,yaku,han,created_at').order('created_at').then(
        function (r) { return r; }, function () { return { data: [], error: null }; }
      )
    ]);
    var err = res[0].error || res[1].error || res[2].error;
    if (err) throw err;
    if (res[3].error) res[3] = { data: [], error: null };
    var players = res[0].data.map(function (p) {
      return { id: p.id, name: p.name, color: Number(p.color) || 0 };
    });
    var nameById = {};
    players.forEach(function (p) { nameById[p.id] = p.name; });
    var entries = res[1].data.map(function (e) {
      return {
        id: e.id,
        playerId: e.player_id,
        name: nameById[e.player_id] || '（不明）',
        chips: e.chips,
        rate: e.rate,
        delta: e.chips * e.rate,
        ts: Date.parse(e.created_at)
      };
    });
    var wins = (res[3].data || []).map(function (w) {
      return {
        id: w.id,
        playerId: w.player_id,
        name: nameById[w.player_id] || '（不明）',
        yaku: w.yaku || [],
        han: w.han,
        ts: Date.parse(w.created_at)
      };
    });
    return {
      rate: res[2].data ? Number(res[2].data.value) : 1,
      players: players,
      entries: entries,
      wins: wins
    };
  }

  async function refresh() {
    pending++;
    syncUI();
    try {
      state = await fetchState();
      loaded = true;
      render();
    } catch (e) {
      toast('通信エラー。電波状況を確認してください');
    } finally {
      pending = Math.max(0, pending - 1);
      syncUI();
    }
  }

  function friendlyError(e) {
    if (e && e.code === '23505') return '同じ名前の参加者がいます';
    if (e && e.code === '23503') return '参加者が見つかりません（削除された可能性）';
    if (e && e.code === '23514') return 'この色はデータベース更新後に使えます（update_colors.sql）';
    return '通信エラー。もう一度お試しください';
  }

  /* 変更系の共通処理: 実行 → エラーはトースト → 最新状態を取り直す */
  async function mutate(fn) {
    pending++;
    syncUI();
    try {
      var res = await fn();
      if (res && res.error) throw res.error;
    } catch (e) {
      toast(friendlyError(e));
    } finally {
      pending = Math.max(0, pending - 1);
      syncUI();
    }
    refresh();
  }

  /* リアルタイム同期: 誰かの変更を全員の画面に即反映 */
  var rtTimer = null;
  sb.channel('chipcho')
    .on('postgres_changes', { event: '*', schema: 'public' }, function () {
      clearTimeout(rtTimer);
      rtTimer = setTimeout(function () {
        if (pending === 0) refresh();
      }, 250);
    })
    .subscribe();

  /* 保険のポーリング（リアルタイム接続が切れた場合用）+ 画面復帰時 */
  setInterval(function () {
    if (!openId && pending === 0 && !document.hidden) refresh();
  }, 60000);
  document.addEventListener('visibilitychange', function () {
    if (!document.hidden && pending === 0) refresh();
  });

  /* ---------- util ---------- */

  var WD = ['日', '月', '火', '水', '木', '金', '土'];

  function $(id) { return document.getElementById(id); }
  function esc(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
    });
  }
  function fmt(n) {
    var s = Math.abs(n).toLocaleString('ja-JP');
    return (n > 0 ? '+' : n < 0 ? '−' : '±') + s;
  }
  function fmtDate(ts) {
    var d = new Date(ts);
    return (d.getMonth() + 1) + '月' + d.getDate() + '日（' + WD[d.getDay()] + '）';
  }
  function fmtTime(ts) {
    var d = new Date(ts);
    return ('0' + d.getHours()).slice(-2) + ':' + ('0' + d.getMinutes()).slice(-2);
  }

  function totals() {
    var map = {};
    state.players.forEach(function (p) { map[p.id] = 0; });
    state.entries.forEach(function (e) {
      if (map[e.playerId] !== undefined) map[e.playerId] += e.delta;
    });
    return map;
  }
  function grandTotal() {
    return state.entries.reduce(function (a, e) { return a + e.delta; }, 0);
  }

  /* 3時間ルールでセッション（=1回の卓）に分割。古い順に返す */
  function groupSessions(entries) {
    var sorted = entries.slice().sort(function (a, b) { return a.ts - b.ts; });
    var sessions = [];
    var cur = null;
    sorted.forEach(function (e) {
      if (!cur || e.ts - cur.lastTs > SESSION_GAP) {
        cur = { start: e.ts, lastTs: e.ts, entries: [] };
        sessions.push(cur);
      }
      cur.entries.push(e);
      cur.lastTs = e.ts;
    });
    return sessions;
  }

  function findSession(key) {
    for (var i = 0; i < lastSessions.length; i++) {
      var s = lastSessions[i];
      if (key >= s.start && key <= s.lastTs) return s;
    }
    return null;
  }

  function sessionMeta(s) {
    var ongoing = Date.now() - s.lastTs <= SESSION_GAP;
    var sameDay = new Date(s.start).toDateString() === new Date(s.lastTs).toDateString();
    var range = fmtTime(s.start) + (s.entries.length > 1
      ? '〜' + (sameDay ? '' : '翌') + fmtTime(s.lastTs) : '');
    var t = {};
    var names = {};
    var sum = 0;
    s.entries.forEach(function (e) {
      if (!(e.playerId in t)) { t[e.playerId] = 0; names[e.playerId] = e.name; }
      t[e.playerId] += e.delta;
      sum += e.delta;
    });
    /* 表示順はどの日付でも参加者リストの登録順で統一（削除済みの人は末尾） */
    var order = [];
    state.players.forEach(function (p) {
      if (p.id in t) order.push({ id: p.id, name: p.name });
    });
    Object.keys(t).forEach(function (id) {
      var known = state.players.some(function (p) { return p.id === id; });
      if (!known) order.push({ id: id, name: names[id] });
    });
    return { ongoing: ongoing, range: range, totals: t, order: order, sum: sum };
  }

  /* ---------- タブ切り替え ---------- */

  function switchView(name) {
    $('viewInput').hidden = name !== 'input';
    $('viewChart').hidden = name !== 'chart';
    $('viewYaku').hidden = name !== 'yaku';
    $('viewHistory').hidden = name !== 'history';
    $('tabInput').classList.toggle('active', name === 'input');
    $('tabChart').classList.toggle('active', name === 'chart');
    $('tabYaku').classList.toggle('active', name === 'yaku');
    $('tabHistory').classList.toggle('active', name === 'history');
    if (name === 'chart' && loaded) renderChart();
    window.scrollTo(0, 0);
  }
  $('tabInput').addEventListener('click', function () { switchView('input'); });
  $('tabChart').addEventListener('click', function () { switchView('chart'); });
  $('tabYaku').addEventListener('click', function () { switchView('yaku'); });
  $('tabHistory').addEventListener('click', function () { switchView('history'); });

  /* ---------- render ---------- */

  function render() {
    if (!loaded) return;
    $('rateVal').textContent = '×' + state.rate;
    renderBanner();
    renderPlayers();
    renderHistory();
    renderChart();
    renderYakuTab();
  }

  var COLOR_MAX = 11;

  /* 役一覧（h=翻数、ym=役満扱い。役満は13翻換算・複合役満は26翻などで表示切替） */
  var YAKU_LIST = [
    { n: '立直', h: 1 }, { n: '一発', h: 1 }, { n: 'ツモ', h: 1 },
    { n: '平和', h: 1 }, { n: 'タンヤオ', h: 1 }, { n: '一盃口', h: 1 },
    { n: '役牌', h: 1 }, { n: '嶺上開花', h: 1 }, { n: '槍槓', h: 1 },
    { n: '海底摸月', h: 1 }, { n: '河底撈魚', h: 1 },
    { n: 'ダブル立直', h: 2 }, { n: '七対子', h: 2 }, { n: '三色同順', h: 2 },
    { n: '一気通貫', h: 2 }, { n: '対々和', h: 2 }, { n: '三暗刻', h: 2 },
    { n: '混老頭', h: 2 }, { n: 'チャンタ', h: 2 }, { n: '小三元', h: 2 },
    { n: '三色同刻', h: 2 }, { n: '三槓子', h: 2 },
    { n: '二盃口', h: 3 }, { n: '混一色', h: 3 }, { n: '純チャン', h: 3 },
    { n: '流し満貫', h: 5, local: true }, { n: '人和', h: 5, local: true },

    { n: '国士無双', h: 13, ym: true }, { n: '四暗刻', h: 13, ym: true },
    { n: '大三元', h: 13, ym: true }, { n: '字一色', h: 13, ym: true },
    { n: '緑一色', h: 13, ym: true }, { n: '清老頭', h: 13, ym: true },
    { n: '大車輪', h: 13, ym: true, local: true },
    { n: '小四喜', h: 13, ym: true }, { n: '大四喜', h: 26, ym: true },
    { n: '九蓮宝燈', h: 13, ym: true }, { n: '四槓子', h: 13, ym: true },
    { n: '天和', h: 13, ym: true }, { n: '地和', h: 13, ym: true }
  ];
  var YAKU_GROUPS = [
    { label: '1翻', h: 1 }, { label: '2翻', h: 2 }, { label: '3翻', h: 3 },
    { label: '5翻(満貫)', h: 5 },

  ];
  var YAKU_HAN = {}, YAKU_IDX = {};
  YAKU_LIST.forEach(function (y, i) { YAKU_HAN[y.n] = y.h; YAKU_IDX[y.n] = i; });
  function hanLabel(han) {
    if (han >= 26) return (han / 13) + '倍役満';
    if (han >= 13) return '役満';
    return han + '翻';
  }

  /* 参加者のグラフカラー（1〜11）。未設定なら登録順で自動割り当て */
  function playerSlot(p, idx) {
    return (p.color >= 1 && p.color <= COLOR_MAX) ? p.color : (idx % COLOR_MAX) + 1;
  }

  function renderBanner() {
    var b = $('banner');
    b.classList.remove('skel', 'skel-banner');
    if (state.entries.length === 0) {
      b.className = 'banner';
      b.innerHTML = ICON.info + '<span>参加者をタップしてチップを記録します</span>';
      return;
    }
    var g = grandTotal();
    if (g === 0) {
      b.className = 'banner ok';
      b.innerHTML = ICON.ok + '<span>全体合計 <strong>0pt</strong> — 帳尻が合っています</span>';
    } else {
      b.className = 'banner warn';
      b.innerHTML = ICON.warn + '<span>全体合計 <strong>' + fmt(g) + 'pt</strong> — 入力漏れ・重複がないか確認</span>';
    }
  }

  function renderPlayers() {
    var t = totals();
    /* 累計の多い順（1位→最下位）。色は登録順ベースなので並べ替え前に確定させる */
    var ranked = state.players.map(function (p, i) {
      return { p: p, slot: playerSlot(p, i), v: t[p.id] || 0, reg: i };
    }).sort(function (a, b) { return b.v - a.v || a.reg - b.reg; });
    $('players').innerHTML = ranked.map(function (x, rank) {
      var cls = x.v > 0 ? 'pos' : x.v < 0 ? 'neg' : 'zero';
      var n = state.entries.filter(function (e) { return e.playerId === x.p.id; }).length;
      return '<button class="player-card" data-id="' + x.p.id + '" aria-label="' + esc(x.p.name) + ' に記録">' +
        '<span class="player-name"><span class="p-dot" style="background:var(--col' + x.slot + ')"></span><span class="pn">' + esc(x.p.name) + '</span></span>' +
        '<span class="player-pts ' + cls + '">' + fmt(x.v) + '</span>' +
        '<span class="player-hint">' + (rank + 1) + '位・' + n + '回の記録</span>' +
        '</button>';
    }).join('');
  }

  function renderHistory() {
    var grid = $('sessionsGrid');
    grid.classList.toggle('two', histCols === 2);
    Array.prototype.forEach.call($('colToggle').children, function (b) {
      b.classList.toggle('active', Number(b.getAttribute('data-cols')) === histCols);
    });
    lastSessions = state.entries.length ? groupSessions(state.entries) : [];
    if (lastSessions.length === 0) {
      grid.innerHTML = '<p class="history-empty">まだ記録がありません</p>';
      return;
    }
    var html = '';
    for (var i = lastSessions.length - 1; i >= 0; i--) {
      html += dayItemHtml(lastSessions[i]);
    }
    grid.innerHTML = html;
  }

  /* 日付ブロック（縦一列）: 常にその日のランキングを表示、タップで記録一覧を展開 */
  function dayItemHtml(s) {
    var m = sessionMeta(s);
    var open = expandedKey !== null && findSession(expandedKey) === s;

    var ranked = m.order.map(function (p) {
      return { name: p.name, v: m.totals[p.id] };
    }).sort(function (a, b) { return b.v - a.v; });
    var rows = ranked.map(function (x, i) {
      var cls = x.v > 0 ? 'pos' : x.v < 0 ? 'neg' : '';
      return '<span class="day-row"><span class="day-rank">' + (i + 1) + '位</span>' +
        '<span class="day-p">' + esc(x.name) + '</span>' +
        '<b class="' + cls + '">' + fmt(x.v) + '</b></span>';
    }).join('');

    var flag = m.ongoing
      ? '<span class="session-live">進行中</span>'
      : (m.sum !== 0 ? '<span class="day-warn">⚠ ' + fmt(m.sum) + '</span>' : '');
    var chev = '<svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9.5l6 6 6-6"/></svg>';

    var body = '';
    if (open) {
      var lis = s.entries.slice().reverse().map(function (e) {
        var cls = e.delta >= 0 ? 'pos' : 'neg';
        return '<li>' +
          '<span class="h-time">' + fmtTime(e.ts) + '</span>' +
          '<span class="h-name">' + esc(e.name) + '</span>' +
          '<span class="h-calc">' + (e.chips > 0 ? '+' : '−') + Math.abs(e.chips) + '枚 ×' + e.rate + '</span>' +
          '<span class="h-delta ' + cls + '">' + fmt(e.delta) + '</span>' +
          '<button class="h-del" data-id="' + e.id + '" aria-label="この記録を削除">' + ICON.x + '</button>' +
          '</li>';
      }).join('');
      body = '<ul class="history-list day-entries">' + lis + '</ul>' +
        '<div class="day-foot"><button class="session-copy" data-key="' + s.start + '">' + ICON.copy + 'この日をコピー</button></div>';
    }

    return '<section class="session day-item' + (open ? ' open' : '') + '">' +
      '<button class="day-head" data-key="' + s.start + '" aria-expanded="' + open + '">' +
        '<span class="dh-l">' +
          '<span class="day-date">' + fmtDate(s.start) + flag + '</span>' +
          '<span class="day-sub">' + m.range + '・' + s.entries.length + '件</span>' +
        '</span>' + chev +
      '</button>' +
      '<div class="day-ranking">' + rows + '</div>' +
      body +
      '</section>';
  }

  /* ---------- 役タブ ---------- */

  function renderYakuTab() {
    var wrap = $('yakuRankWrap');
    if (!state.wins.length) {
      wrap.innerHTML = '';
    } else {
      var perPlayer = state.players.map(function (p, i) {
        var counts = {};
        var order = [];
        state.wins.forEach(function (w) {
          if (w.playerId !== p.id) return;
          w.yaku.forEach(function (y) {
            if (!(y in counts)) { counts[y] = 0; order.push(y); }
            counts[y]++;
          });
        });
        order.sort(function (a, b) { return (YAKU_HAN[a] || 0) - (YAKU_HAN[b] || 0) || YAKU_IDX[a] - YAKU_IDX[b]; });
        var total = order.reduce(function (a, y) { return a + counts[y]; }, 0);
        return { name: p.name, slot: playerSlot(p, i), total: total, tags: order.map(function (y) { return { n: y, c: counts[y] }; }) };
      }).filter(function (x) { return x.tags.length > 0; });

      wrap.innerHTML = '<div class="win-list">' + perPlayer.map(function (x) {
        var tags = x.tags.map(function (t) {
          return '<span class="yaku-stat-tag">' + esc(t.n) + '<b>' + t.c + '</b></span>';
        }).join('');
        return '<section class="session">' +
          '<div class="yaku-stat-head">' +
          (x.slot ? '<span class="p-dot" style="background:var(--col' + x.slot + ')"></span>' : '') +
          '<span class="yaku-stat-name">' + esc(x.name) + '</span>' +
          '<span class="yaku-stat-total">計' + x.total + '回</span>' +
          '</div>' +
          '<div class="yaku-stat-tags">' + tags + '</div>' +
          '</section>';
      }).join('') + '</div>';
    }

    var hist = $('winHistory');
    if (!state.wins.length) {
      hist.innerHTML = '<p class="history-empty">まだ上がりの記録がありません</p>';
      return;

    var sorted = state.wins.slice().sort(function (a, b) { return b.ts - a.ts; });
    hist.innerHTML = sorted.map(function (w) {
      var p = state.players.filter(function (x) { return x.id === w.playerId; })[0];
      var idx = state.players.indexOf(p);
      var slot = p ? playerSlot(p, idx) : 0;
      var tags = w.yaku.map(function (y) { return '<span class="win-tag">' + esc(y) + '</span>'; }).join('');
      return '<div class="win-card">' +
        '<div class="win-card-top">' +
        (slot ? '<span class="p-dot" style="background:var(--col' + slot + ')"></span>' : '') +
        '<span class="win-name">' + esc(w.name) + '</span>' +
        '<span class="win-han' + (w.han >= 13 ? ' ym' : '') + '">' + hanLabel(w.han) + '</span>' +
        '<span class="win-time">' + mdLabel(w.ts) + ' ' + fmtTime(w.ts) + '</span>' +
        '<button class="h-del" data-id="' + w.id + '" aria-label="この記録を削除">' + ICON.x + '</button>' +
        '</div>' +
        '<div class="win-tags">' + tags + '</div>' +
        '</div>';
    }).join('');
  }

  $('addWinBtn').addEventListener('click', openWinSheet);
  $('yakuRefreshBtn').addEventListener('click', refresh);

    mutate(function () { return sb.from('wins').delete().eq('id', id); });

  /* ---------- 推移グラフ ---------- */

  var hiddenIds = {};   /* 凡例タップで非表示にした参加者 */
  var chartData = null; /* ツールチップ用の描画時データ */
  var chartMode = 'entry';  /* entry=記録ごと | session=卓ごと | rank=順位 */
  var chartDays = 0;        /* 0=全期間, 30, 7 */
  try {
    var _m = localStorage.getItem('chipcho-chart-mode');
    if (_m === 'session' || _m === 'rank') chartMode = _m;
    var _d = Number(localStorage.getItem('chipcho-chart-days'));
    if (_d === 30 || _d === 7) chartDays = _d;
  } catch (e) {}

  function niceStep(raw) {
    if (!(raw > 0)) return 1;
    var mag = Math.pow(10, Math.floor(Math.log(raw) / Math.LN10));
    var n = raw / mag;
    return (n <= 1 ? 1 : n <= 2 ? 2 : n <= 5 ? 5 : 10) * mag;
  }

  function mdLabel(ts) {
    var d = new Date(ts);
    return (d.getMonth() + 1) + '/' + d.getDate();
  }

  function seriesBase() {
    return state.players.map(function (p, i) {
      return { id: p.id, name: p.name, slot: playerSlot(p, i), vals: [] };
    });
  }

  /* 記録1件ごとの累計（期間指定時はゼロスタート） */
  function buildEntryModel(cut) {
    var ents = state.entries.filter(function (e) { return e.ts >= cut; })
      .sort(function (a, b) { return a.ts - b.ts; });
    if (!ents.length) return null;
    var series = seriesBase();
    series.forEach(function (sr) { sr.vals.push(0); });
    var ticks = [];
    var prevTs = null;
    ents.forEach(function (e, k) {
      series.forEach(function (sr) {
        var last = sr.vals[sr.vals.length - 1];
        sr.vals.push(last + (e.playerId === sr.id ? e.delta : 0));
      });
      if (prevTs === null || e.ts - prevTs > SESSION_GAP) {
        ticks.push({ i: k + 1, label: mdLabel(e.ts) });
      }
      prevTs = e.ts;
    });
    var labels = ['開始'].concat(ents.map(function (e) {
      return mdLabel(e.ts) + ' ' + fmtTime(e.ts);
    }));
    return { series: series, labels: labels, ticks: ticks, yType: 'pt', sep: true };
  }

  /* 卓ごとの累計（期間指定時はゼロスタート） */
  function buildSessionModel(cut) {
    var ents = state.entries.filter(function (e) { return e.ts >= cut; });
    if (!ents.length) return null;
    var sess = groupSessions(ents);
    var series = seriesBase();
    series.forEach(function (sr) { sr.vals.push(0); });
    sess.forEach(function (s) {
      var d = {};
      s.entries.forEach(function (e) { d[e.playerId] = (d[e.playerId] || 0) + e.delta; });
      series.forEach(function (sr) {
        sr.vals.push(sr.vals[sr.vals.length - 1] + (d[sr.id] || 0));
      });
    });
    var labels = ['開始'].concat(sess.map(function (s) { return mdLabel(s.start); }));
    var ticks = sess.map(function (s, k) { return { i: k + 1, label: mdLabel(s.start) }; });
    return { series: series, labels: labels, ticks: ticks, yType: 'pt', sep: false };
  }

  /* 卓終了時点の順位変動（順位は常に全期間の累計で判定、期間は表示範囲のみ） */
  function buildRankModel(cut) {
    var sessAll = groupSessions(state.entries);
    var cum = {};
    state.players.forEach(function (p) { cum[p.id] = 0; });
    var kept = [];
    sessAll.forEach(function (s) {
      s.entries.forEach(function (e) {
        if (cum[e.playerId] !== undefined) cum[e.playerId] += e.delta;
      });
      if (s.start >= cut) {
        var snap = {};
        state.players.forEach(function (p) { snap[p.id] = cum[p.id]; });
        kept.push({ start: s.start, cum: snap });
      }
    });
    if (!kept.length) return null;
    var series = seriesBase();
    kept.forEach(function (k) {
      series.forEach(function (sr) {
        var mine = k.cum[sr.id];
        var rank = 1;
        state.players.forEach(function (p) { if (k.cum[p.id] > mine) rank++; });
        sr.vals.push(rank);
      });
    });
    var labels = kept.map(function (k) { return mdLabel(k.start); });
    var ticks = kept.map(function (k, i) { return { i: i, label: mdLabel(k.start) }; });
    return { series: series, labels: labels, ticks: ticks, yType: 'rank', sep: false };
  }

  function renderChart() {
    if ($('viewChart').hidden) return;
    syncChartControls();
    var wrap = $('chartCard');
    if (!state.players.length || !state.entries.length) {
      wrap.innerHTML = '<p class="chart-empty">記録が増えると、ここに収支の推移が表示されます</p>';
      return;
    }
    var cut = chartDays ? Date.now() - chartDays * 86400000 : 0;
    var model = chartMode === 'rank' ? buildRankModel(cut)
      : chartMode === 'session' ? buildSessionModel(cut)
      : buildEntryModel(cut);
    if (!model) {
      wrap.innerHTML = '<p class="chart-empty">この期間の記録はありません</p>';
      return;
    }
    drawChart(wrap, model);
  }

  function drawChart(wrap, model) {
    var legend = model.series.map(function (sr) {
      return '<button class="lg-chip' + (hiddenIds[sr.id] ? ' off' : '') + '" data-id="' + sr.id + '">' +
        '<span class="lg-dot" style="background:var(--col' + sr.slot + ')"></span>' + esc(sr.name) + '</button>';
    }).join('');

    var visible = model.series.filter(function (sr) { return !hiddenIds[sr.id]; });
    if (!visible.length) {
      wrap.innerHTML = '<div class="chart-legend">' + legend + '</div>' +
        '<p class="chart-empty">凡例をタップして表示する参加者を選んでください</p>';
      return;
    }

    var n = model.labels.length;
    var isRank = model.yType === 'rank';
    var y0, y1, step;
    if (isRank) {
      y0 = 1;
      y1 = Math.max(2, state.players.length);
      step = 1;
    } else {
      var min = 0, max = 0;
      visible.forEach(function (sr) {
        sr.vals.forEach(function (v) { if (v < min) min = v; if (v > max) max = v; });
      });
      if (min === max) max = min + 1;
      step = niceStep((max - min) / 4);
      y0 = Math.floor(min / step) * step;
      y1 = Math.ceil(max / step) * step;
    }

    var W = Math.max(280, wrap.clientWidth - 30);
    var H = 250;
    var padL = 8, padR = 84, padT = 14, padB = 24;
    var iw = W - padL - padR, ih = H - padT - padB;
    function X(i) { return padL + (n === 1 ? iw / 2 : i * iw / (n - 1)); }
    function Y(v) {
      return isRank
        ? padT + (v - y0) / (y1 - y0) * ih          /* 1位が上 */
        : padT + (y1 - v) / (y1 - y0) * ih;
    }

    var svg = '<svg width="' + W + '" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '" role="img" aria-label="収支の推移">';

    for (var t = y0; t <= y1; t += step) {
      var ty = Y(t);
      var zero = !isRank && t === 0;
      svg += '<line x1="' + padL + '" x2="' + (W - padR + 42) + '" y1="' + ty + '" y2="' + ty + '"' +
        ' stroke="var(' + (zero ? '--muted' : '--line') + ')" stroke-width="1"' + (zero ? '' : ' stroke-opacity=".8"') + '/>';
      svg += '<text x="' + padL + '" y="' + (ty - 4) + '" font-size="10" fill="var(--muted)">' +
        (isRank ? t + '位' : t.toLocaleString('ja-JP')) + '</text>';
    }

    var showEvery = Math.ceil(model.ticks.length / 6);
    model.ticks.forEach(function (tk, idx) {
      var tx = X(tk.i);
      if (model.sep) {
        svg += '<line x1="' + tx + '" x2="' + tx + '" y1="' + padT + '" y2="' + (H - padB) +
          '" stroke="var(--line)" stroke-width="1" stroke-dasharray="2 4"/>';
      }
      if (idx % showEvery !== 0 && idx !== model.ticks.length - 1) return;
      svg += '<text x="' + tx + '" y="' + (H - 6) + '" font-size="10" fill="var(--muted)" text-anchor="middle">' + tk.label + '</text>';
    });

    var allDots = n <= 16 || isRank;
    visible.forEach(function (sr) {
      var pts = sr.vals.map(function (v, i) { return X(i) + ',' + Y(v); }).join(' ');
      svg += '<polyline points="' + pts + '" fill="none" stroke="var(--col' + sr.slot + ')" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>';
      if (allDots) {
        sr.vals.forEach(function (v, i) {
          svg += '<circle cx="' + X(i) + '" cy="' + Y(v) + '" r="3" fill="var(--col' + sr.slot + ')" stroke="var(--surface)" stroke-width="1.5"/>';
        });
      } else {
        svg += '<circle cx="' + X(n - 1) + '" cy="' + Y(sr.vals[n - 1]) + '" r="3" fill="var(--col' + sr.slot + ')" stroke="var(--surface)" stroke-width="1.5"/>';
      }
    });

    var ends = visible.map(function (sr) {
      return { y: Y(sr.vals[n - 1]), name: sr.name, val: sr.vals[n - 1] };
    }).sort(function (a, b) { return a.y - b.y; });
    for (var j = 1; j < ends.length; j++) {
      if (ends[j].y - ends[j - 1].y < 13) ends[j].y = ends[j - 1].y + 13;
    }
    ends.forEach(function (e) {
      var ly = Math.min(H - padB - 2, Math.max(padT + 6, e.y));
      svg += '<text x="' + (W - padR + 8) + '" y="' + (ly + 3.5) + '" font-size="11">' +
        '<tspan fill="var(--ink)" font-weight="600">' + esc(e.name.slice(0, 4)) + '</tspan>' +
        '<tspan fill="var(--muted)" dx="4">' + (isRank ? e.val + '位' : fmt(e.val)) + '</tspan></text>';
    });

    svg += '<line class="cross" x1="-10" x2="-10" y1="' + padT + '" y2="' + (H - padB) + '" stroke="var(--muted)" stroke-width="1" stroke-dasharray="3 3" opacity="0"/>';
    svg += '</svg>';

    var hint = isRank
      ? 'グラフをなぞると各卓終了時の順位・凡例タップで表示切替'
      : 'グラフをなぞると各時点の累計・凡例タップで表示切替';
    wrap.innerHTML = '<div class="chart-legend">' + legend + '</div>' +
      '<div class="chart-box">' + svg + '<div class="chart-tip" hidden></div></div>' +
      '<p class="chart-hint">' + hint + '</p>';

    chartData = { labels: model.labels, visible: visible, X: X, n: n, W: W, padL: padL, padR: padR, isRank: isRank };
    bindChartPointer(wrap);
  }

  function syncChartControls() {
    Array.prototype.forEach.call($('chartModeSeg').children, function (b) {
      b.classList.toggle('active', b.getAttribute('data-m') === chartMode);
    });
    Array.prototype.forEach.call($('periodChips').children, function (b) {
      b.classList.toggle('active', Number(b.getAttribute('data-d')) === chartDays);
    });
  }

  $('chartModeSeg').addEventListener('click', function (ev) {
    var b = ev.target.closest && ev.target.closest('[data-m]');
    if (!b) return;
    chartMode = b.getAttribute('data-m');
    try { localStorage.setItem('chipcho-chart-mode', chartMode); } catch (e) {}
    renderChart();
  });

  $('periodChips').addEventListener('click', function (ev) {
    var b = ev.target.closest && ev.target.closest('[data-d]');
    if (!b) return;
    chartDays = Number(b.getAttribute('data-d'));
    try { localStorage.setItem('chipcho-chart-days', String(chartDays)); } catch (e) {}
    renderChart();
  });

  $('chartCard').addEventListener('click', function (ev) {
    var chip = ev.target.closest && ev.target.closest('.lg-chip');
    if (!chip) return;
    hiddenIds[chip.getAttribute('data-id')] = !hiddenIds[chip.getAttribute('data-id')];
    renderChart();
  });

  function bindChartPointer(wrap) {
    var svgEl = wrap.querySelector('svg');
    var tip = wrap.querySelector('.chart-tip');
    if (!svgEl || !tip) return;
    var cross = svgEl.querySelector('.cross');

    function show(ev) {
      var d = chartData;
      if (!d) return;
      var r = svgEl.getBoundingClientRect();
      var cx = ev.clientX - r.left;
      var span = d.n === 1 ? 1 : (d.W - d.padL - d.padR) / (d.n - 1);
      var i = Math.round((cx - d.padL) / span);
      i = Math.max(0, Math.min(d.n - 1, i));
      var x = d.X(i);
      cross.setAttribute('x1', x);
      cross.setAttribute('x2', x);
      cross.setAttribute('opacity', '1');
      var rows = d.visible.slice()
        .sort(function (a, b) { return d.isRank ? a.vals[i] - b.vals[i] : b.vals[i] - a.vals[i]; })
        .map(function (sr) {
          return '<div class="tt-row"><span class="tt-l">' +
            '<span class="tt-dot" style="background:var(--col' + sr.slot + ')"></span>' +
            esc(sr.name) + '</span><b>' + (d.isRank ? sr.vals[i] + '位' : fmt(sr.vals[i])) + '</b></div>';
        }).join('');
      tip.innerHTML = '<div class="tt-date">' + d.labels[i] + '</div>' + rows;
      tip.hidden = false;
      var left = x < d.W / 2 ? x + 14 : x - tip.offsetWidth - 14;
      tip.style.left = Math.max(0, Math.min(d.W - tip.offsetWidth, left)) + 'px';
    }
    function hide() {
      tip.hidden = true;
      cross.setAttribute('opacity', '0');
    }
    svgEl.addEventListener('pointerdown', show);
    svgEl.addEventListener('pointermove', function (ev) {
      if (ev.pointerType === 'mouse' || ev.buttons) show(ev);
    });
    svgEl.addEventListener('pointerleave', hide);
    svgEl.addEventListener('pointerup', function () { setTimeout(hide, 1500); });
  }

  var resizeTimer = null;
  window.addEventListener('resize', function () {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function () {
      if (loaded && !$('viewChart').hidden) renderChart();
    }, 150);
  });


  /* ---------- sheets ---------- */

  var openId = null;
  function openSheet(id) {
    openId = id;
    $('backdrop').classList.add('show');
    $(id).classList.add('show');
  }
  function closeSheet() {
    if (!openId) return;
    $(openId).classList.remove('show');
    $('backdrop').classList.remove('show');
    openId = null;
  }
  $('backdrop').addEventListener('click', closeSheet);
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') closeSheet();
  });

  /* ---------- チップ記録 ---------- */

  var entry = { playerId: null, sign: 1, digits: '' };

  function openEntry(playerId) {
    var p = state.players.filter(function (x) { return x.id === playerId; })[0];
    if (!p) return;
    entry = { playerId: playerId, sign: 1, digits: '' };
    $('entryWho').textContent = p.name;
    setSign(1);
    disarm($('removePlayer'), 'この参加者を削除');
    renderEntryPreview();
    renderColorRow();
    openSheet('entrySheet');
  }

  function renderColorRow() {
    var cur = 0;
    state.players.forEach(function (p, i) {
      if (p.id === entry.playerId) cur = playerSlot(p, i);
    });
    var html = '';
    for (var c = 1; c <= COLOR_MAX; c++) {
      html += '<button class="csw' + (c === cur ? ' active' : '') + '" data-c="' + c +
        '" style="background:var(--col' + c + ')" aria-label="グラフカラー' + c + '"></button>';
    }
    $('colorRow').innerHTML = html;
  }

  $('colorRow').addEventListener('click', function (ev) {
    var b = ev.target.closest && ev.target.closest('.csw');
    if (!b || !entry.playerId) return;
    Array.prototype.forEach.call($('colorRow').children, function (x) {
      x.classList.toggle('active', x === b);
    });
    var c = Number(b.getAttribute('data-c'));
    mutate(function () {
      return sb.from('players').update({ color: c }).eq('id', entry.playerId);
    });
  });

  function setSign(s) {
    entry.sign = s;
    $('signPos').classList.toggle('active', s === 1);
    $('signNeg').classList.toggle('active', s === -1);
    renderEntryPreview();
  }
  $('signPos').addEventListener('click', function () { setSign(1); });
  $('signNeg').addEventListener('click', function () { setSign(-1); });

  function renderEntryPreview() {
    var n = parseInt(entry.digits || '0', 10);
    var delta = entry.sign * n * state.rate;
    var cls = delta > 0 ? 'pos' : delta < 0 ? 'neg' : '';
    $('entryPreview').innerHTML =
      '<span>' + n + '枚 × レート' + state.rate + ' =</span>' +
      '<strong class="' + cls + '">' + fmt(delta) + 'pt</strong>';
    $('entryConfirm').disabled = n === 0;
  }

  $('entryKeypad').addEventListener('click', function (ev) {
    var btn = ev.target.closest && ev.target.closest('[data-k]');
    if (!btn) return;
    var k = btn.getAttribute('data-k');
    if (k === 'C') entry.digits = '';
    else if (k === 'B') entry.digits = entry.digits.slice(0, -1);
    else if (entry.digits.length < 4) entry.digits += k;
    renderEntryPreview();
  });

  $('entryConfirm').addEventListener('click', function () {
    var n = parseInt(entry.digits || '0', 10);
    if (!n || !entry.playerId) return;
    var payload = { player_id: entry.playerId, chips: entry.sign * n, rate: state.rate };
    mutate(function () { return sb.from('entries').insert(payload); });
    closeSheet();
  });

  $('removePlayer').addEventListener('click', function () {
    var btn = this;
    if (!btn.classList.contains('arm')) {
      arm(btn, '本当に削除する？（記録も消えます）');
      return;
    }
    var id = entry.playerId;
    mutate(function () { return sb.from('players').delete().eq('id', id); });
    closeSheet();
  });

  function arm(btn, label) {
    btn.classList.add('arm');
    btn.textContent = label;
    btn._t = setTimeout(function () { disarmDefault(btn); }, 3000);
  }
  function disarm(btn, label) {
    clearTimeout(btn._t);
    btn.classList.remove('arm');
    btn.textContent = label;
  }
  function disarmDefault(btn) {
    if (btn === $('removePlayer')) disarm(btn, 'この参加者を削除');
  }

  /* ---------- レート ---------- */

  $('rateBtn').addEventListener('click', function () {
    $('rateInput').value = '';
    highlightPreset(state.rate);
    openSheet('rateSheet');
  });

  function highlightPreset(r) {
    Array.prototype.forEach.call($('ratePresets').children, function (b) {
      b.classList.toggle('active', Number(b.getAttribute('data-r')) === r);
    });
  }

  function setRate(r) {
    mutate(function () {
      return sb.from('settings').update({ value: r }).eq('key', 'rate');
    });
    closeSheet();
    toast('レートを ×' + r + ' にしました');
  }

  $('ratePresets').addEventListener('click', function (ev) {
    var btn = ev.target.closest && ev.target.closest('[data-r]');
    if (!btn) return;
    setRate(Number(btn.getAttribute('data-r')));
  });

  $('rateConfirm').addEventListener('click', function () {
    var v = parseInt($('rateInput').value, 10);
    if (!v || v < 1) { toast('1以上の数を入れてください'); return; }
    setRate(v);
  });

  /* ---------- 参加者追加 ---------- */

  $('addPlayerBtn').addEventListener('click', function () {
    $('nameInput').value = '';
    openSheet('nameSheet');
    setTimeout(function () { $('nameInput').focus(); }, 300);
  });

  $('nameConfirm').addEventListener('click', addPlayer);
  $('nameInput').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') addPlayer();
  });

  function addPlayer() {
    var name = $('nameInput').value.trim().slice(0, 12);
    if (!name) { toast('名前を入れてください'); return; }
    if (state.players.some(function (p) { return p.name === name; })) {
      toast('同じ名前の参加者がいます');
      return;
    }
    /* 未使用のグラフカラーを割り当て */
    var used = {};
    state.players.forEach(function (p, i) { used[playerSlot(p, i)] = true; });
    var slot = (state.players.length % COLOR_MAX) + 1;
    for (var c = 1; c <= COLOR_MAX; c++) { if (!used[c]) { slot = c; break; } }
    mutate(function () {
      return sb.from('players').insert({ name: name, color: slot });
    });
    closeSheet();
  }

  /* ---------- 履歴（列数切替・日付タップで展開・記録削除・コピー） ---------- */

  $('colToggle').addEventListener('click', function (ev) {
    var b = ev.target.closest && ev.target.closest('[data-cols]');
    if (!b) return;
    histCols = Number(b.getAttribute('data-cols'));
    try { localStorage.setItem('chipcho-hist-cols', String(histCols)); } catch (e) {}
    renderHistory();
  });

  $('sessionsGrid').addEventListener('click', function (ev) {
    var del = ev.target.closest && ev.target.closest('.h-del');
    if (del) {
      if (!del.classList.contains('arm')) {
        del.classList.add('arm');
        del.textContent = '削除';
        setTimeout(function () {
          del.classList.remove('arm');
          del.innerHTML = ICON.x;
        }, 3000);
        return;
      }
      var id = del.getAttribute('data-id');
      mutate(function () { return sb.from('entries').delete().eq('id', id); });
      return;
    }

    var cp = ev.target.closest && ev.target.closest('.session-copy');
    if (cp) {
      var s = findSession(Number(cp.getAttribute('data-key')));
      if (s) copySession(s);
      return;
    }

    var head = ev.target.closest && ev.target.closest('.day-head');
    if (head) {
      var key = Number(head.getAttribute('data-key'));
      var cur = expandedKey !== null ? findSession(expandedKey) : null;
      expandedKey = (cur && cur === findSession(key)) ? null : key;
      renderHistory();
    }
  });

  function copySession(s) {
    var m = sessionMeta(s);
    var ranked = m.order.map(function (p) {
      return { name: p.name, v: m.totals[p.id] };
    }).sort(function (a, b) { return b.v - a.v; });
    var lines = ['【' + fmtDate(s.start) + 'の収支】'];
    ranked.forEach(function (x, i) {
      lines.push((i + 1) + '位 ' + x.name + '　' + fmt(x.v));
    });
    lines.push('合計　' + fmt(m.sum) + (m.sum === 0 ? ' ✅' : ' ⚠️'));
    copyText(lines.join('\n'));
  }

  /* ---------- プレイヤータップ ---------- */

  $('players').addEventListener('click', function (ev) {
    var card = ev.target.closest && ev.target.closest('.player-card');
    if (card) openEntry(card.getAttribute('data-id'));
  });

  /* ---------- 更新・コピー ---------- */

  $('refreshBtn').addEventListener('click', refresh);
  $('chartRefreshBtn').addEventListener('click', refresh);

  $('copyBtn').addEventListener('click', function () {
    var t = totals();
    var lines = ['【チップ収支・累計】' + fmtDate(Date.now()) + ' ' + fmtTime(Date.now()) + ' 時点'];
    state.players.forEach(function (p) {
      lines.push(p.name + '　' + fmt(t[p.id] || 0));
    });
    var g = grandTotal();
    lines.push('合計　' + fmt(g) + (g === 0 ? ' ✅' : ' ⚠️'));
    copyText(lines.join('\n'));
  });

  function copyText(text) {
    function done() { toast('コピーしました。LINEに貼り付けできます'); }
    function fallback() {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); done(); }
      catch (e) { toast('コピーできませんでした'); }
      document.body.removeChild(ta);
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done, fallback);
    } else {
      fallback();
    }
  }

  /* ---------- toast ---------- */

  var toastTimer = null;
  function toast(msg) {
    var el = $('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { el.classList.remove('show'); }, 2500);
  }

  /* ---------- 起動 ---------- */

  refresh();
})();
</script>
</body>
</html>
